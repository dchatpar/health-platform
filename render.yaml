# Simpler Render Blueprint
services:
  - name: health-backend
    template: node
    repo: https://github.com/dchatpar/health-platform
    branch: main
    rootDir: apps/backend
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: PORT
        value: 3000
      - key: ALLOWED_ORIGINS
        value: "*"

  - name: health-pharmacy-app
    template: node
    repo: https://github.com/dchatpar/health-platform
    branch: main
    rootDir: apps/pharmacy-app
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://health-backend.onrender.com

  - name: health-admin-panel
    template: node
    repo: https://github.com/dchatpar/health-platform
    branch: main
    rootDir: apps/admin-panel
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://health-backend.onrender.com

databases:
  - name: health-db
    plan: free
    region: oregon

redis:
  - name: health-redis
    plan: free
    region: oregon
