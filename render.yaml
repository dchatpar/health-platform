# Render Blueprint - Healthcare Platform
# Deploy from render.com dashboard: New -> Blueprint -> Upload this file

services:
  - name: health-backend
    env: node
    region: oregon
    plan: free
    rootDir: apps/backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: PORT
        value: 3000
      - key: ALLOWED_ORIGINS
        value: "*"

  - name: health-pharmacy-app
    env: node
    region: oregon
    plan: free
    rootDir: apps/pharmacy-app
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://health-backend.onrender.com
      - key: NEXT_PUBLIC_SOCKET_URL
        value: https://health-backend.onrender.com

  - name: health-admin-panel
    env: node
    region: oregon
    plan: free
    rootDir: apps/admin-panel
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://health-backend.onrender.com

postgresql:
  - name: health-db
    plan: free
    region: oregon

redis:
  - name: health-redis
    plan: free
    region: oregon
