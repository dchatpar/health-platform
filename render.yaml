# Render Blueprint - Healthcare Platform

databases:
  - name: health-db
    plan: free

services:
  - type: web
    name: health-backend
    env: node
    region: oregon
    plan: free
    rootDir: apps/backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: health-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: PORT
        value: 3000
      - key: ALLOWED_ORIGINS
        value: "*"

  - type: web
    name: health-pharmacy-app
    env: node
    region: oregon
    plan: free
    rootDir: apps/pharmacy-app
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://health-backend.onrender.com
      - key: NEXT_PUBLIC_SOCKET_URL
        value: https://health-backend.onrender.com

  - type: web
    name: health-admin-panel
    env: node
    region: oregon
    plan: free
    rootDir: apps/admin-panel
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://health-backend.onrender.com

  - type: keyvalue
    name: health-redis
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
